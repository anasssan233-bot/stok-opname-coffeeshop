<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk — Stok Opname Coffee Shop</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="mark">☕ STOK OPNAME</div>
      <div class="tagline">Hitung stok tiap cabang, satu catatan yang sama untuk semua.</div>
      <div class="foot">3 CABANG &middot; SATU SISTEM &middot; v1.0</div>
    </div>
    <div class="login-panel">
      <div class="login-card">
        <h1>Masuk</h1>
        <div class="sub">Masuk untuk mulai input atau cek stok opname.</div>
        <div id="errorBox"></div>
        <form id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn block">Masuk</button>
        </form>
        <div class="hint-box">
          AKUN CONTOH<br/>
          admin / admin123 — akses semua cabang<br/>
          staff1 / staff123 — Cabang 1<br/>
          staff2 / staff123 — Cabang 2<br/>
          staff3 / staff123 — Cabang 3
        </div>
      </div>
    </div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('errorBox');
  errorBox.innerHTML = '';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorBox.innerHTML = `<div class="error-msg">${data.error || 'Gagal masuk'}</div>`;
      return;
    }
    window.location.href = '/index.html';
  } catch (err) {
    errorBox.innerHTML = `<div class="error-msg">Tidak bisa terhubung ke server</div>`;
  }
});
</script>
</body>
</html>
